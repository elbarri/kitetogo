no_gear_extracted:
  de: |
    Ich konnte nicht verstehen, welche Ausrüstung Sie anbieten möchten.
    Bitte geben Sie Details wie: Typ (Kite/Board/etc), Marke, Modell, Größe und Jahr an.

    Zum Beispiel: "Ich möchte meinen Duotone Evo 12m von 2022 vermieten"
  en: |
    I couldn't understand which gear you want to offer.
    Please provide details like: type (kite/board/etc), brand, model, size, and year.

    For example: "I want to rent my Duotone Evo 12m from 2022"
  es: |
    No pude entender qué equipo quieres ofrecer.
    Por favor proporciona detalles como: tipo (kite/tabla/etc), marca, modelo, tamaño y año.

    Por ejemplo: "Quiero alquilar mi Duotone Evo 12m del 2022"
  fr: |
    Je n'ai pas pu comprendre quel matériel vous souhaitez offrir.
    Veuillez fournir des détails tels que : type (kite/planche/etc), marque, modèle, taille et année.

    Par exemple : "Je veux louer mon Duotone Evo 12m de 2022"
  it: |
    Non sono riuscito a capire quale attrezzatura vuoi offrire.
    Fornisci dettagli come: tipo (kite/tavola/etc), marca, modello, taglia e anno.

    Ad esempio: "Voglio affittare il mio Duotone Evo 12m del 2022"
  nl: |
    Ik kon niet begrijpen welke uitrusting je wilt aanbieden.
    Geef details zoals: type (kite/board/etc), merk, model, maat en jaar.

    Bijvoorbeeld: "Ik wil mijn Duotone Evo 12m uit 2022 verhuren"
