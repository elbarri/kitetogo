deposit_ask_currency:
  de: |
    Welche Währung verwenden Sie für die Ersatzwerte Ihrer Ausrüstung?

    (Beginnend mit: __ITEM__)
  en: |
    Which currency will you use to specify the replacement values for your equipment?

    (Starting with: __ITEM__)
  es: |
    ¿Qué moneda usarás para indicar los valores de reposición de tu equipo?

    (Empezando por: __ITEM__)
  fr: |
    Quelle devise utiliserez-vous pour indiquer les valeurs de remplacement de votre équipement ?

    (En commençant par : __ITEM__)
  it: |
    Quale valuta userai per indicare i valori di sostituzione della tua attrezzatura?

    (Iniziando con: __ITEM__)
  nl: |
    Welke valuta gebruik je voor de vervangingswaarden van je uitrusting?

    (Beginnend met: __ITEM__)

deposit_ask_duration:
  de: |
    Gesamtkaution: __TOTAL__ für __ITEM_COUNT__ Artikel

    Wie viele Stunden dauert die Miete? (2-72)
  en: |
    Total deposit: __TOTAL__ for __ITEM_COUNT__ item(s)

    How many hours will the rental last? (2-72)
  es: |
    Depósito total: __TOTAL__ por __ITEM_COUNT__ ítem(s)

    ¿Cuántas horas durará el alquiler? (2-72)
  fr: |
    Dépôt total : __TOTAL__ pour __ITEM_COUNT__ article(s)

    Combien d'heures durera la location ? (2-72)
  it: |
    Deposito totale: __TOTAL__ per __ITEM_COUNT__ articolo(i)

    Quante ore durerà il noleggio? (2-72)
  nl: |
    Totale borgsom: __TOTAL__ voor __ITEM_COUNT__ item(s)

    Hoeveel uur duurt de verhuur? (2-72)

deposit_ask_value:
  de: |
    Was ist der Ersatzwert in __CURRENCY__ für Ihre __ITEM__?

    (Sie können dies später im Mietvertrag bearbeiten)
  en: |
    What's the replacement value in __CURRENCY__ for your __ITEM__?

    (You can edit this later in the rental agreement)
  es: |
    ¿Cuál es el valor de reposición en __CURRENCY__ de tu __ITEM__?

    (Puedes editarlo después en el acuerdo de alquiler)
  fr: |
    Quelle est la valeur de remplacement en __CURRENCY__ de votre __ITEM__ ?

    (Vous pouvez le modifier plus tard dans le contrat de location)
  it: |
    Qual è il valore di sostituzione in __CURRENCY__ per il tuo __ITEM__?

    (Puoi modificarlo più tardi nel contratto di noleggio)
  nl: |
    Wat is de vervangingswaarde in __CURRENCY__ voor je __ITEM__?

    (Je kunt dit later wijzigen in het huurcontract)

deposit_ask_value_with_hint:
  de: |
    Was ist der Ersatzwert in __CURRENCY__ für Ihre __ITEM__?

    Zuletzt verwendet: __SUGGESTED_VALUE__
    (Sie können dies später im Mietvertrag bearbeiten)
  en: |
    What's the replacement value in __CURRENCY__ for your __ITEM__?

    Last used: __SUGGESTED_VALUE__
    (You can edit this later in the rental agreement)
  es: |
    ¿Cuál es el valor de reposición en __CURRENCY__ de tu __ITEM__?

    Último usado: __SUGGESTED_VALUE__
    (Puedes editarlo después en el acuerdo de alquiler)
  fr: |
    Quelle est la valeur de remplacement en __CURRENCY__ de votre __ITEM__ ?

    Dernier utilisé : __SUGGESTED_VALUE__
    (Vous pouvez le modifier plus tard dans le contrat de location)
  it: |
    Qual è il valore di sostituzione in __CURRENCY__ per il tuo __ITEM__?

    Ultimo usato: __SUGGESTED_VALUE__
    (Puoi modificarlo più tardi nel contratto di noleggio)
  nl: |
    Wat is de vervangingswaarde in __CURRENCY__ voor je __ITEM__?

    Laatst gebruikt: __SUGGESTED_VALUE__
    (Je kunt dit later wijzigen in het huurcontract)

deposit_authorized_owner:
  de: |
    Die Kaution von __AMOUNT__ von __RENTER_NAME__ wurde autorisiert!

    Die Sperrung ist aktiv und wird nach __DURATION_HOURS__ Stunde(n) automatisch freigegeben, es sei denn, Sie müssen sie erfassen.
  en: |
    The security deposit of __AMOUNT__ from __RENTER_NAME__ has been authorized!

    The hold is active and will be automatically released after __DURATION_HOURS__ hour(s) unless you need to capture it.
  es: |
    El depósito de garantía de __AMOUNT__ de __RENTER_NAME__ ha sido autorizado!

    La retención está activa y será liberada automáticamente después de __DURATION_HOURS__ hora(s) a menos que necesites capturarlo.
  fr: |
    Le dépôt de garantie de __AMOUNT__ de __RENTER_NAME__ a été autorisé !

    Le blocage est actif et sera automatiquement libéré après __DURATION_HOURS__ heure(s) sauf si vous devez le capturer.
  it: |
    Il deposito cauzionale di __AMOUNT__ da __RENTER_NAME__ è stato autorizzato!

    Il blocco è attivo e verrà automaticamente rilasciato dopo __DURATION_HOURS__ ora/e a meno che tu non debba catturarlo.
  nl: |
    De borgsom van __AMOUNT__ van __RENTER_NAME__ is geautoriseerd!

    De blokkering is actief en zal automatisch worden vrijgegeven na __DURATION_HOURS__ uur tenzij je het moet vastleggen.

deposit_authorized_renter:
  de: |
    Ihre Kaution von __AMOUNT__ für __OWNER_NAME__ ist jetzt aktiv.

    Dies ist nur eine Autorisierungssperre - Ihre Karte wurde NICHT belastet.
    Die Sperre wird automatisch freigegeben, wenn die Miete erfolgreich endet.
  en: |
    Your security deposit of __AMOUNT__ for __OWNER_NAME__ is now active.

    This is only an authorization hold - your card has NOT been charged.
    The hold will be automatically released when the rental ends successfully.
  es: |
    Tu depósito de garantía de __AMOUNT__ para __OWNER_NAME__ está ahora activo.

    Esto es solo una retención de autorización - tu tarjeta NO ha sido cobrada.
    La retención será liberada automáticamente cuando el alquiler termine exitosamente.
  fr: |
    Votre dépôt de garantie de __AMOUNT__ pour __OWNER_NAME__ est maintenant actif.

    C'est seulement un blocage d'autorisation - votre carte n'a PAS été débitée.
    Le blocage sera automatiquement libéré lorsque la location se terminera avec succès.
  it: |
    Il tuo deposito cauzionale di __AMOUNT__ per __OWNER_NAME__ è ora attivo.

    Questo è solo un blocco di autorizzazione - la tua carta NON è stata addebitata.
    Il blocco verrà automaticamente rilasciato quando il noleggio terminerà con successo.
  nl: |
    Je borgsom van __AMOUNT__ voor __OWNER_NAME__ is nu actief.

    Dit is alleen een autorisatieblocking - je kaart is NIET belast.
    De blokkering wordt automatisch vrijgegeven wanneer de verhuur succesvol eindigt.

deposit_checkout_button:
  de: "Kaution autorisieren"
  en: "Authorize Deposit"
  es: "Autorizar Depósito"
  fr: "Autoriser le dépôt"
  it: "Autorizza deposito"
  nl: "Borgsom autoriseren"

deposit_checkout_ready:
  de: |
    Der Eigentümer hat eine Kaution von __AMOUNT__ für __DURATION__ angefordert.

    Dies ist eine Autorisierung - Ihre Karte wird nicht belastet, es sei denn, es entsteht ein Schaden. Klicken Sie unten, um zu autorisieren.
  en: |
    The owner has requested a security deposit of __AMOUNT__ for __DURATION__.

    This is an authorization hold - your card won't be charged unless damage occurs. Click below to authorize.
  es: |
    El propietario ha solicitado un depósito de garantía de __AMOUNT__ por __DURATION__.

    Esto es una retención temporal - tu tarjeta no será cobrada a menos que ocurra algún daño. Haz clic abajo para autorizar.
  fr: |
    Le propriétaire a demandé un dépôt de garantie de __AMOUNT__ pour __DURATION__.

    C'est une autorisation de prélèvement - votre carte ne sera pas débitée sauf en cas de dommages. Cliquez ci-dessous pour autoriser.
  it: |
    Il proprietario ha richiesto un deposito cauzionale di __AMOUNT__ per __DURATION__.

    Questo è un blocco di autorizzazione - la tua carta non verrà addebitata a meno che non si verifichino danni. Clicca sotto per autorizzare.
  nl: |
    De eigenaar heeft een borgsom van __AMOUNT__ voor __DURATION__ aangevraagd.

    Dit is een autorisatieblocking - je kaart wordt niet belast tenzij er schade optreedt. Klik hieronder om te autoriseren.

deposit_contact_not_registered:
  de: "__CONTACT_NAME__ hat KiteToGo noch nicht verwendet. Bitten Sie sie/ihn, zuerst eine Nachricht an diese Nummer zu senden und dann den Kontakt erneut zu teilen."
  en: "__CONTACT_NAME__ hasn't used KiteToGo yet. Ask them to send a message to this number first, then share their contact again."
  es: "__CONTACT_NAME__ aún no ha usado KiteToGo. Pídele que envíe un mensaje a este número primero y luego comparte su contacto nuevamente."
  fr: "__CONTACT_NAME__ n'a pas encore utilisé KiteToGo. Demandez-lui d'envoyer d'abord un message à ce numéro, puis partagez à nouveau son contact."
  it: "__CONTACT_NAME__ non ha ancora usato KiteToGo. Chiedigli di inviare prima un messaggio a questo numero, poi condividi di nuovo il suo contatto."
  nl: "__CONTACT_NAME__ heeft KiteToGo nog niet gebruikt. Vraag hen eerst een bericht naar dit nummer te sturen en deel dan opnieuw hun contact."

deposit_created_request_contact:
  de: |
    Kautionsanfrage erfolgreich erstellt!

    Betrag: __AMOUNT__
    Dauer: __DURATION__

    Teilen Sie jetzt den Kontakt des Mieters, um die Kaution anzufordern.
  en: |
    Security deposit request created successfully!

    Amount: __AMOUNT__
    Duration: __DURATION__

    Now share the renter's contact so we can request the security deposit from them.
  es: |
    ¡Solicitud de depósito de garantía creada exitosamente!

    Monto: __AMOUNT__
    Duración: __DURATION__

    Ahora comparte el contacto del arrendatario para solicitarle el depósito de garantía.
  fr: |
    Demande de dépôt de garantie créée avec succès !

    Montant : __AMOUNT__
    Durée : __DURATION__

    Partagez maintenant le contact du locataire pour lui demander le dépôt de garantie.
  it: |
    Richiesta di deposito cauzionale creata con successo!

    Importo: __AMOUNT__
    Durata: __DURATION__

    Ora condividi il contatto del locatario per richiedere il deposito cauzionale.
  nl: |
    Borgsomverzoek succesvol aangemaakt!

    Bedrag: __AMOUNT__
    Duur: __DURATION__

    Deel nu het contact van de huurder om de borgsom aan te vragen.

deposit_created_review_agreement:
  de: |
    Kautionsanfrage für __CONTACT_NAME__ erstellt.

    Gesamt: __AMOUNT__
    Artikel: __ITEMS_COUNT__
    Dauer: __DURATION_HOURS__ Stunde(n)

    Sie können Dauer, Namen, Artikelwerte und Fotos auf der Vertragsseite bearbeiten, bevor Sie es an den Mieter senden.
  en: |
    Deposit request created for __CONTACT_NAME__.

    Total: __AMOUNT__
    Items: __ITEMS_COUNT__
    Duration: __DURATION_HOURS__ hour(s)

    You can edit the duration, names, item values, and add/remove photos on the agreement page before sending it to the renter.
  es: |
    Solicitud de depósito creada para __CONTACT_NAME__.

    Total: __AMOUNT__
    Items: __ITEMS_COUNT__
    Duración: __DURATION_HOURS__ hora(s)

    Puedes editar la duración, nombres, valores de items, y agregar/quitar fotos en la página del acuerdo antes de enviarlo al arrendatario.
  fr: |
    Demande de dépôt créée pour __CONTACT_NAME__.

    Total: __AMOUNT__
    Articles: __ITEMS_COUNT__
    Durée: __DURATION_HOURS__ heure(s)

    Vous pouvez modifier la durée, les noms, les valeurs des articles, et ajouter/supprimer des photos avant d'envoyer au locataire.
  it: |
    Richiesta di deposito creata per __CONTACT_NAME__.

    Totale: __AMOUNT__
    Articoli: __ITEMS_COUNT__
    Durata: __DURATION_HOURS__ ora/e

    Puoi modificare durata, nomi, valori degli articoli e aggiungere/rimuovere foto nella pagina del contratto prima di inviarlo al noleggiatore.
  nl: |
    Borgverzoek aangemaakt voor __CONTACT_NAME__.

    Totaal: __AMOUNT__
    Items: __ITEMS_COUNT__
    Duur: __DURATION_HOURS__ uur

    Je kunt de duur, namen, itemwaarden en foto's aanpassen op de overeenkomstpagina voordat je het naar de huurder stuurt.

deposit_created_with_items:
  de: |
    Kautionsanfrage erstellt und an __CONTACT_NAME__ gesendet.

    Gesamt: __AMOUNT__
    Artikel: __ITEMS_COUNT__
    Dauer: __DURATION_HOURS__ Stunde(n)

    Sie werden benachrichtigt, wenn die Zahlung erfolgt ist.
  en: |
    Deposit request created and sent to __CONTACT_NAME__.

    Total: __AMOUNT__
    Items: __ITEMS_COUNT__
    Duration: __DURATION_HOURS__ hour(s)

    You'll be notified when they complete the payment.
  es: |
    Solicitud de depósito creada y enviada a __CONTACT_NAME__.

    Total: __AMOUNT__
    Items: __ITEMS_COUNT__
    Duración: __DURATION_HOURS__ hora(s)

    Te notificaremos cuando complete el pago.
  fr: |
    Demande de dépôt créée et envoyée à __CONTACT_NAME__.

    Total: __AMOUNT__
    Articles: __ITEMS_COUNT__
    Durée: __DURATION_HOURS__ heure(s)

    Vous serez notifié lorsqu'il effectuera le paiement.
  it: |
    Richiesta di deposito creata e inviata a __CONTACT_NAME__.

    Totale: __AMOUNT__
    Articoli: __ITEMS_COUNT__
    Durata: __DURATION_HOURS__ ora/e

    Sarai avvisato quando completerà il pagamento.
  nl: |
    Borgverzoek aangemaakt en verstuurd naar __CONTACT_NAME__.

    Totaal: __AMOUNT__
    Items: __ITEMS_COUNT__
    Duur: __DURATION_HOURS__ uur

    U wordt op de hoogte gebracht wanneer de betaling is voltooid.

deposit_dispute_button:
  de: "Streit eröffnen"
  en: "Start Dispute"
  es: "Iniciar Disputa"
  fr: "Ouvrir litige"
  it: "Apri contestazione"
  nl: "Geschil openen"

deposit_dispute_initiated:
  de: |
    Ein Streit wurde für die Kaution von __AMOUNT__ eröffnet.

    Bitte senden Sie Fotos des Ausrüstungszustands und eine kurze Erklärung des Problems. Unser Team wird prüfen und sich in Kürze bei Ihnen melden.
  en: |
    A dispute has been opened for the security deposit of __AMOUNT__.

    Please send photos of the gear condition and a brief explanation of the issue. Our team will review and contact you shortly.
  es: |
    Se ha abierto una disputa para el depósito de garantía de __AMOUNT__.

    Por favor envía fotos del estado del equipo y una breve explicación del problema. Nuestro equipo revisará y te contactará en breve.
  fr: |
    Un litige a été ouvert pour le dépôt de garantie de __AMOUNT__.

    Veuillez envoyer des photos de l'état de l'équipement et une brève explication du problème. Notre équipe examinera et vous contactera sous peu.
  it: |
    È stata aperta una contestazione per il deposito cauzionale di __AMOUNT__.

    Invia foto dello stato dell'attrezzatura e una breve spiegazione del problema. Il nostro team esaminerà e ti contatterà a breve.
  nl: |
    Er is een geschil geopend voor de borgsom van __AMOUNT__.

    Stuur alsjeblieft foto's van de staat van de uitrusting en een korte uitleg van het probleem. Ons team zal het beoordelen en binnenkort contact opnemen.

deposit_dispute_notif_counterparty:
  de: |
    ⚠️ __INITIATOR_NAME__ hat einen Streit für die Kaution von __AMOUNT__ eröffnet.

    Bitte senden Sie Fotos des Ausrüstungszustands und Ihre Erklärung. Unser Team wird beide Seiten prüfen und sich in Kürze bei Ihnen melden.
  en: |
    ⚠️ __INITIATOR_NAME__ has opened a dispute for the security deposit of __AMOUNT__.

    Please send photos of the gear condition and your explanation. Our team will review both sides and contact you shortly.
  es: |
    ⚠️ __INITIATOR_NAME__ ha abierto una disputa para el depósito de garantía de __AMOUNT__.

    Por favor envía fotos del estado del equipo y tu explicación. Nuestro equipo revisará ambos lados y te contactará en breve.
  fr: |
    ⚠️ __INITIATOR_NAME__ a ouvert un litige pour le dépôt de garantie de __AMOUNT__.

    Veuillez envoyer des photos de l'état de l'équipement et votre explication. Notre équipe examinera les deux parties et vous contactera sous peu.
  it: |
    ⚠️ __INITIATOR_NAME__ ha aperto una contestazione per il deposito cauzionale di __AMOUNT__.

    Invia foto dello stato dell'attrezzatura e la tua spiegazione. Il nostro team esaminerà entrambe le parti e ti contatterà a breve.
  nl: |
    ⚠️ __INITIATOR_NAME__ heeft een geschil geopend voor de borgsom van __AMOUNT__.

    Stuur alsjeblieft foto's van de staat van de uitrusting en je uitleg. Ons team zal beide kanten beoordelen en binnenkort contact opnemen.

deposit_duration_mismatch:
  de: |
    Die Mietdauer stimmt nicht überein. Eigentümer wählte __OWNER_HOURS__ Stunde(n), aber Sie wählten __RENTER_HOURS__ Stunde(n).

    Die Kautionsanfrage wurde storniert. Der Eigentümer kann eine neue Anfrage mit der richtigen Dauer erstellen.
  en: |
    The rental duration didn't match. Owner selected __OWNER_HOURS__ hour(s), but you selected __RENTER_HOURS__ hour(s).

    The deposit request has been cancelled. The owner can create a new request with the correct duration.
  es: |
    La duración del alquiler no coincide. El propietario seleccionó __OWNER_HOURS__ hora(s), pero tú seleccionaste __RENTER_HOURS__ hora(s).

    La solicitud de depósito ha sido cancelada. El propietario puede crear una nueva solicitud con la duración correcta.
  fr: |
    La durée de location ne correspond pas. Le propriétaire a sélectionné __OWNER_HOURS__ heure(s), mais vous avez sélectionné __RENTER_HOURS__ heure(s).

    La demande de dépôt a été annulée. Le propriétaire peut créer une nouvelle demande avec la bonne durée.
  it: |
    La durata del noleggio non corrisponde. Il proprietario ha selezionato __OWNER_HOURS__ ora/e, ma tu hai selezionato __RENTER_HOURS__ ora/e.

    La richiesta di deposito è stata annullata. Il proprietario può creare una nuova richiesta con la durata corretta.
  nl: |
    De verhuurduur komt niet overeen. Eigenaar selecteerde __OWNER_HOURS__ uur, maar jij selecteerde __RENTER_HOURS__ uur.

    De borgsomaaanvraag is geannuleerd. De eigenaar kan een nieuw verzoek maken met de juiste duur.

