deposit_missing_amount:
  de: |
    Sie möchten eine Kaution in __CURRENCY__, haben aber den Betrag nicht angegeben.

    Beispiel: "Kaution von 500 __CURRENCY__ anfordern"
  en: |
    You want a deposit in __CURRENCY__ but didn't specify the amount.

    Example: "Request deposit of 500 __CURRENCY__"
  es: |
    Quieres un depósito en __CURRENCY__ pero no especificaste el monto.

    Ejemplo: "Solicitar depósito de 500 __CURRENCY__"
  fr: |
    Vous voulez un dépôt en __CURRENCY__ mais n'avez pas spécifié le montant.

    Exemple : "Demander un dépôt de 500 __CURRENCY__"
  it: |
    Vuoi un deposito in __CURRENCY__ ma non hai specificato l'importo.

    Esempio: "Richiedi deposito di 500 __CURRENCY__"
  nl: |
    Je wilt een borgsom in __CURRENCY__ maar hebt het bedrag niet opgegeven.

    Voorbeeld: "Vraag borgsom van 500 __CURRENCY__ aan"

deposit_missing_amount_and_currency:
  de: |
    Um eine Kaution anzufordern, geben Sie bitte sowohl den Betrag als auch die Währung an (USD, EUR oder GBP).

    Beispiel: "Kaution von 500 USD anfordern"
  en: |
    To request a security deposit, please specify both the amount and currency (USD, EUR, or GBP).

    Example: "Request deposit of 500 USD"
  es: |
    Para solicitar un depósito de garantía, por favor especifica el monto y la moneda (USD, EUR o GBP).

    Ejemplo: "Solicitar depósito de 500 USD"
  fr: |
    Pour demander un dépôt de garantie, veuillez spécifier à la fois le montant et la devise (USD, EUR ou GBP).

    Exemple : "Demander un dépôt de 500 USD"
  it: |
    Per richiedere un deposito cauzionale, specifica sia l'importo che la valuta (USD, EUR o GBP).

    Esempio: "Richiedi deposito di 500 USD"
  nl: |
    Om een borgsom aan te vragen, geef zowel het bedrag als de valuta op (USD, EUR of GBP).

    Voorbeeld: "Vraag borgsom van 500 USD aan"

deposit_missing_currency:
  de: |
    Sie haben __AMOUNT__ erwähnt, aber keine Währung angegeben. Bitte geben Sie USD, EUR oder GBP an.

    Beispiel: "Kaution von __AMOUNT__ USD anfordern"
  en: |
    You mentioned __AMOUNT__ but didn't specify the currency. Please specify USD, EUR, or GBP.

    Example: "Request deposit of __AMOUNT__ USD"
  es: |
    Mencionaste __AMOUNT__ pero no especificaste la moneda. Por favor indica USD, EUR o GBP.

    Ejemplo: "Solicitar depósito de __AMOUNT__ USD"
  fr: |
    Vous avez mentionné __AMOUNT__ mais n'avez pas spécifié la devise. Veuillez préciser USD, EUR ou GBP.

    Exemple : "Demander un dépôt de __AMOUNT__ USD"
  it: |
    Hai menzionato __AMOUNT__ ma non hai specificato la valuta. Specifica USD, EUR o GBP.

    Esempio: "Richiedi deposito di __AMOUNT__ USD"
  nl: |
    Je noemde __AMOUNT__ maar specificeerde geen valuta. Geef USD, EUR of GBP op.

    Voorbeeld: "Vraag borgsom van __AMOUNT__ USD aan"

deposit_no_gear_to_rent:
  de: "Sie müssen Ausrüstung gelistet haben, bevor Sie eine Kaution anfordern können. Verwenden Sie 'Ausrüstung anbieten', um Ihre Ausrüstung zuerst zu listen."
  en: "You need to have gear listed before requesting a security deposit. Use 'offer gear' to list your equipment first."
  es: "Necesitas tener equipo publicado antes de solicitar un depósito de garantía. Usa 'ofrecer equipo' para publicar tu equipo primero."
  fr: "Vous devez avoir du matériel listé avant de demander un dépôt de garantie. Utilisez 'offrir du matériel' pour lister votre équipement d'abord."
  it: "Devi avere attrezzatura elencata prima di richiedere un deposito cauzionale. Usa 'offrire attrezzatura' per elencare la tua attrezzatura per prima."
  nl: "Je moet uitrusting vermeld hebben voordat je een borgsom kunt aanvragen. Gebruik 'uitrusting aanbieden' om je uitrusting eerst te vermelden."

deposit_pay_button:
  de: "Kaution Zahlen"
  en: "Pay Deposit"
  es: "Pagar Depósito"
  fr: "Payer le Dépôt"
  it: "Paga Deposito"
  nl: "Borg Betalen"

deposit_release_button:
  de: "Kaution freigeben"
  en: "Release Deposit"
  es: "Liberar Depósito"
  fr: "Libérer le dépôt"
  it: "Rilascia deposito"
  nl: "Borgsom vrijgeven"

deposit_released:
  de: "Die Kaution von __AMOUNT__ wurde freigegeben. Die Autorisierung auf der Karte des Mieters wurde storniert."
  en: "The security deposit of __AMOUNT__ has been released. The authorization hold on the renter's card has been cancelled."
  es: "El depósito de garantía de __AMOUNT__ ha sido liberado. La retención en la tarjeta del arrendatario ha sido cancelada."
  fr: "Le dépôt de garantie de __AMOUNT__ a été libéré. L'autorisation de prélèvement sur la carte du locataire a été annulée."
  it: "Il deposito cauzionale di __AMOUNT__ è stato rilasciato. L'autorizzazione sulla carta del locatario è stata annullata."
  nl: "De borgsom van __AMOUNT__ is vrijgegeven. De autorisatieblocking op de kaart van de huurder is geannuleerd."

deposit_released_renter:
  de: |
    Gute Nachrichten! Ihre Kaution von __AMOUNT__ für __OWNER_NAME__ wurde vollständig freigegeben.

    Die Autorisierung auf Ihrer Karte wurde storniert. Sie sollten die Mittel in Kürze wieder verfügbar sehen.
  en: |
    Good news! Your security deposit of __AMOUNT__ for __OWNER_NAME__ has been fully released.

    The authorization hold on your card has been cancelled. You should see the funds available again shortly.
  es: |
    ¡Buenas noticias! Tu depósito de garantía de __AMOUNT__ para __OWNER_NAME__ ha sido completamente liberado.

    La retención en tu tarjeta ha sido cancelada. Deberías ver los fondos disponibles nuevamente en breve.
  fr: |
    Bonne nouvelle ! Votre dépôt de garantie de __AMOUNT__ pour __OWNER_NAME__ a été entièrement libéré.

    L'autorisation de prélèvement sur votre carte a été annulée. Vous devriez voir les fonds disponibles à nouveau sous peu.
  it: |
    Buone notizie! Il tuo deposito cauzionale di __AMOUNT__ per __OWNER_NAME__ è stato completamente rilasciato.

    L'autorizzazione sulla tua carta è stata cancellata. Dovresti vedere i fondi nuovamente disponibili a breve.
  nl: |
    Goed nieuws! Je borgsom van __AMOUNT__ voor __OWNER_NAME__ is volledig vrijgegeven.

    De autorisatieblocking op je kaart is geannuleerd. Je zou de fondsen binnenkort weer beschikbaar moeten zien.

deposit_reminder_after_consent:
  de: |
    Wenn du deine Ausrüstung an einen Fremden vermieten möchtest, denke daran, dass du eine Kaution verlangen kannst.
    Sag es einfach, und das System wird dich anleiten.
  en: |
    When you want to rent your gear to a stranger, remember you can request a security deposit.
    Just say so, and the system will guide you.
  es: |
    Cuando quieras alquilar tu equipo a un desconocido, recuerda que puedes solicitar un depósito de garantía.
    Sólo dilo, y el sistema te guiará.
  fr: |
    Lorsque vous souhaitez louer votre matériel à un inconnu, n'oubliez pas que vous pouvez demander une caution.
    Dites-le simplement, et le système vous guidera.
  it: |
    Quando vuoi noleggiare la tua attrezzatura a uno sconosciuto, ricorda che puoi richiedere un deposito cauzionale.
    Basta dirlo, e il sistema ti guiderà.
  nl: |
    Wanneer je je uitrusting aan een vreemde wilt verhuren, vergeet dan niet dat je een borg kunt vragen.
    Zeg het gewoon, en het systeem begeleidt je.

deposit_renter_attached_owner_notification:
  de: "Kontakt erhalten! Wir haben einen Zahlungslink an __RENTER_NAME__ gesendet. Sie werden benachrichtigt, sobald die Kaution autorisiert wurde."
  en: "Contact received! We've sent a payment link to __RENTER_NAME__. You'll be notified once they authorize the deposit."
  es: "Contacto recibido! Hemos enviado un link de pago a __RENTER_NAME__. Te notificaremos cuando autorice el depósito."
  fr: "Contact reçu ! Nous avons envoyé un lien de paiement à __RENTER_NAME__. Vous serez notifié une fois qu'il aura autorisé le dépôt."
  it: "Contatto ricevuto! Abbiamo inviato un link di pagamento a __RENTER_NAME__. Verrai notificato una volta che autorizza il deposito."
  nl: "Contact ontvangen! We hebben een betalingslink naar __RENTER_NAME__ gestuurd. Je wordt op de hoogte gebracht zodra ze de borgsom autoriseren."

deposit_renter_checkout_invitation:
  de: |
    __OWNER_NAME__ fordert eine Kaution von __AMOUNT__ für eine __DURATION__ Miete an.

    Dies ist nur eine Autorisierungssperre - Ihre Karte wird nicht belastet, es sei denn, es gibt Schäden an der Ausrüstung. Klicken Sie unten zur Autorisierung:
  en: |
    __OWNER_NAME__ is requesting a security deposit of __AMOUNT__ for a __DURATION__ rental.

    This is an authorization hold only - your card won't be charged unless there's damage to the equipment. Click below to authorize:
  es: |
    __OWNER_NAME__ solicita un depósito de garantía de __AMOUNT__ para un alquiler de __DURATION__.

    Esto es solo una retención de autorización - no se cobrará a tu tarjeta a menos que haya daños al equipo. Haz clic abajo para autorizar:
  fr: |
    __OWNER_NAME__ demande un dépôt de garantie de __AMOUNT__ pour une location de __DURATION__.

    Il s'agit uniquement d'une autorisation de blocage - votre carte ne sera pas débitée sauf en cas de dommages à l'équipement. Cliquez ci-dessous pour autoriser :
  it: |
    __OWNER_NAME__ richiede un deposito cauzionale di __AMOUNT__ per un noleggio di __DURATION__.

    Questa è solo un'autorizzazione di blocco - la tua carta non verrà addebitata a meno che non ci siano danni all'attrezzatura. Clicca qui sotto per autorizzare:
  nl: |
    __OWNER_NAME__ vraagt een borgsom van __AMOUNT__ aan voor een __DURATION__ verhuur.

    Dit is alleen een autorisatieblokkering - je kaart wordt niet belast tenzij er schade is aan de apparatuur. Klik hieronder om te autoriseren:

deposit_request_contact:
  de: |
    Kautionsübersicht:

    __ITEMS_SUMMARY__

    Gesamt: __TOTAL__
    Dauer: __DURATION__

    Teilen Sie jetzt den Kontakt des Mieters, um die Kaution anzufordern.
  en: |
    Security deposit summary:

    __ITEMS_SUMMARY__

    Total: __TOTAL__
    Duration: __DURATION__

    Now share the renter's contact so we can request the security deposit from them.
  es: |
    Resumen del depósito de garantía:

    __ITEMS_SUMMARY__

    Total: __TOTAL__
    Duración: __DURATION__

    Ahora comparte el contacto del arrendatario para solicitarle el depósito de garantía.
  fr: |
    Résumé du dépôt de garantie :

    __ITEMS_SUMMARY__

    Total : __TOTAL__
    Durée : __DURATION__

    Partagez maintenant le contact du locataire pour lui demander le dépôt de garantie.
  it: |
    Riepilogo del deposito cauzionale:

    __ITEMS_SUMMARY__

    Totale: __TOTAL__
    Durata: __DURATION__

    Ora condividi il contatto del locatario per richiedere il deposito cauzionale.
  nl: |
    Borgsom overzicht:

    __ITEMS_SUMMARY__

    Totaal: __TOTAL__
    Duur: __DURATION__

    Deel nu het contact van de huurder om de borgsom aan te vragen.

deposit_request_header:
  de: "Kautionsanfrage"
  en: "Security Deposit Request"
  es: "Solicitud de Depósito"
  fr: "Demande de Dépôt"
  it: "Richiesta Deposito"
  nl: "Borgverzoek"

deposit_request_to_renter:
  de: |
    __OWNER_NAME__ bittet um eine Kaution für die Miete der Ausrüstung.

    Artikel (__ITEMS_COUNT__):
    __ITEMS_TEXT__

    Gesamt: __AMOUNT__
    Dauer: __DURATION_HOURS__ Stunde(n)

    Die Kaution wird einbehalten und zurückgegeben, wenn Sie die Ausrüstung in gutem Zustand zurückgeben.
  en: |
    __OWNER_NAME__ is requesting a security deposit for renting their equipment.

    Items (__ITEMS_COUNT__):
    __ITEMS_TEXT__

    Total: __AMOUNT__
    Duration: __DURATION_HOURS__ hour(s)

    The deposit will be held and returned when you return the equipment in good condition.
  es: |
    __OWNER_NAME__ solicita un depósito de garantía por el alquiler de su equipo.

    Items (__ITEMS_COUNT__):
    __ITEMS_TEXT__

    Total: __AMOUNT__
    Duración: __DURATION_HOURS__ hora(s)

    El depósito será retenido y devuelto cuando devuelvas el equipo en buen estado.
  fr: |
    __OWNER_NAME__ demande un dépôt de garantie pour la location de son équipement.

    Articles (__ITEMS_COUNT__):
    __ITEMS_TEXT__

    Total: __AMOUNT__
    Durée: __DURATION_HOURS__ heure(s)

    Le dépôt sera conservé et restitué lorsque vous rendrez l'équipement en bon état.
  it: |
    __OWNER_NAME__ richiede un deposito cauzionale per il noleggio della sua attrezzatura.

    Articoli (__ITEMS_COUNT__):
    __ITEMS_TEXT__

    Totale: __AMOUNT__
    Durata: __DURATION_HOURS__ ora/e

    Il deposito sarà trattenuto e restituito quando restituirai l'attrezzatura in buone condizioni.
  nl: |
    __OWNER_NAME__ vraagt een borgsom voor het huren van hun uitrusting.

    Items (__ITEMS_COUNT__):
    __ITEMS_TEXT__

    Totaal: __AMOUNT__
    Duur: __DURATION_HOURS__ uur

    De borg wordt ingehouden en teruggestort wanneer u de uitrusting in goede staat terugbrengt.

deposit_return_ok_already_released:
  de: "Die Kaution von __AMOUNT__ wurde bereits von __OWNER_NAME__ freigegeben! Die Autorisierung auf Ihrer Karte sollte in Kürze aufgehoben werden."
  en: "The deposit of __AMOUNT__ has already been released by __OWNER_NAME__! The authorization hold on your card should be cleared shortly."
  es: "¡El depósito de __AMOUNT__ ya ha sido liberado por __OWNER_NAME__! La retención en tu tarjeta debería cancelarse en breve."
  fr: "Le dépôt de __AMOUNT__ a déjà été libéré par __OWNER_NAME__ ! L'autorisation de blocage sur votre carte devrait être annulée sous peu."
  it: "Il deposito di __AMOUNT__ è già stato rilasciato da __OWNER_NAME__! L'autorizzazione sulla tua carta dovrebbe essere annullata a breve."
  nl: "De borgsom van __AMOUNT__ is al vrijgegeven door __OWNER_NAME__! De autorisatieblocking op je kaart zou binnenkort moeten worden opgeheven."

deposit_return_ok_button:
  de: "Rückgabe OK"
  en: "Return OK"
  es: "Devolución OK"
  fr: "Retour OK"
  it: "Restituzione OK"
  nl: "Teruggave OK"

deposit_return_ok_owner_notification:
  de: |
    ✅ __RENTER_NAME__ hat bestätigt, dass die Rückgabe der Ausrüstung in Ordnung ist.

    Wenn alles in Ordnung ist, geben Sie bitte die Kaution von __AMOUNT__ frei.
  en: |
    ✅ __RENTER_NAME__ confirmed that the gear return is OK.

    If everything is in order, please release the security deposit of __AMOUNT__.
  es: |
    ✅ __RENTER_NAME__ confirmó que la devolución del equipo está bien.

    Si todo está en orden, por favor libera el depósito de garantía de __AMOUNT__.
  fr: |
    ✅ __RENTER_NAME__ a confirmé que le retour de l'équipement est OK.

    Si tout est en ordre, veuillez libérer le dépôt de garantie de __AMOUNT__.
  it: |
    ✅ __RENTER_NAME__ ha confermato che la restituzione dell'attrezzatura è OK.

    Se tutto è in ordine, rilascia il deposito cauzionale di __AMOUNT__.
  nl: |
    ✅ __RENTER_NAME__ heeft bevestigd dat de teruggave van de uitrusting OK is.

    Als alles in orde is, geef dan de borgsom van __AMOUNT__ vrij.

deposit_return_ok_waiting:
  de: |
    Danke für die Bestätigung, dass die Rückgabe in Ordnung ist!

    Wir warten darauf, dass __OWNER_NAME__ die Kaution freigibt. Wenn sie dies nicht bald tun und Sie glauben, dass es ein Problem gibt, können Sie einen Streit eröffnen.
  en: |
    Thank you for confirming the return is OK!

    We're waiting for __OWNER_NAME__ to release the deposit. If they don't release it soon and you believe there's an issue, you can open a dispute.
  es: |
    ¡Gracias por confirmar que la devolución está bien!

    Estamos esperando que __OWNER_NAME__ libere el depósito. Si no lo libera pronto y crees que hay un problema, puedes abrir una disputa.
  fr: |
    Merci de confirmer que le retour est OK !

    Nous attendons que __OWNER_NAME__ libère le dépôt. S'ils ne le libèrent pas bientôt et que vous pensez qu'il y a un problème, vous pouvez ouvrir un litige.
  it: |
    Grazie per aver confermato che la restituzione è OK!

    Stiamo aspettando che __OWNER_NAME__ rilasci il deposito. Se non lo rilasciano presto e credi ci sia un problema, puoi aprire una contestazione.
  nl: |
    Bedankt voor het bevestigen dat de teruggave OK is!

    We wachten tot __OWNER_NAME__ de borgsom vrijgeeft. Als ze dat niet snel doen en je denkt dat er een probleem is, kun je een geschil openen.

deposit_select_duration:
  de: |
