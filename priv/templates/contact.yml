  fr: "(Le système est actuellement en mode test, et les paiements fonctionnent uniquement avec le numéro de carte 4242 4242 4242 4242)"
  it: "(Il sistema è attualmente in modalità test e i pagamenti funzionano solo con il numero di carta 4242 4242 4242 4242)"
  nl: "(Het systeem bevindt zich momenteel in testmodus, en betalingen werken alleen met kaartnummer 4242 4242 4242 4242)"
