welcome_message:
  de: |
    Hallo! 🪂

    KiteToGo verbindet Kitesurfer, die weltweit Kitematerial mieten möchten. Das kann ich für dich tun:

    🌎 Einen Standort anhängen
    🪁🪈🏄 Dein Equipment in deiner Gegend zur Miete anbieten
    🔍 Ausrüstung überall auf der Welt finden
    📋 Sehen, was du gelistet hast
    🗑️ Dein Equipment löschen

    Sag mir einfach, was du tun möchtest! Du kannst Text- oder Sprachnachrichten senden.
  en: |
    Hey there! 🪂

    KiteToGo connects kitesurfers who want to rent kite gear around the world. Here's what I can do:

    🌎 Attach a location
    🪁🪈🏄 Offer your gear for rent in your area
    🔍 Find gear anywhere in the world
    📋 See what you have listed
    🗑️ Delete your gear

    Just tell me what you'd like to do! You can send text or voice messages.
  es: |
    Qué tal? 🪂

    KiteToGo conecta kiters que busquen alquilar equipo de kite alrededor del mundo. Esto es lo que puedo hacer:

    🌎 Adjuntar una ubicación
    🪁🪈🏄 Ofrecer tu equipo para alquilar en tu zona
    🔍 Encontrar equipo en algun lugar del mundo
    📋 Ver qué tienes listado
    🔕 Borrar tu equipo

    Solo comentame qué te gustaría hacer! Por mensaje de texto o voz.
  fr: |
    Salut ! 🪂

    KiteToGo relie les kitesurfeurs qui souhaitent louer du matériel partout dans le monde. Voici ce que je peux faire :

    🌎 Joindre un lieu
    🪁🪈🏄 Proposer votre matériel à la location dans votre zone
    🔍 Trouver du matériel partout dans le monde
    📋 Voir ce que vous avez listé
    🗑️ Supprimer votre matériel

    Dites-moi simplement ce que vous voulez faire ! Vous pouvez envoyer un message texte ou vocal.
  it: |
    Ciao! 🪂

    KiteToGo mette in contatto kitesurfisti che vogliono noleggiare attrezzatura in tutto il mondo. Ecco cosa posso fare:

    🌎 Aggiungere una località
    🪁🪈🏄 Offrire la tua attrezzatura in affitto nella tua zona
    🔍 Trovare attrezzatura ovunque nel mondo
    📋 Vedere cosa hai pubblicato
    🗑️ Eliminare la tua attrezzatura

    Dimmi semplicemente cosa vuoi fare! Puoi inviare messaggi di testo o vocali.
  nl: |
    Hallo daar! 🪂

    KiteToGo verbindt kitesurfers die overal ter wereld kitemateriaal willen huren. Dit kan ik doen:

    🌎 Een locatie toevoegen
    🪁🪈🏄 Je uitrusting te huur aanbieden in jouw regio
    🔍 Uitrusting overal ter wereld vinden
    📋 Bekijken wat je hebt aangeboden
    🗑️ Je uitrusting verwijderen

    Vertel me gewoon wat je wilt doen! Je kunt een tekst- of spraakbericht sturen.
